name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - run: npm publish --access public --provenance --ignore-scripts

      - name: Build MCPB bundle
        run: npx @anthropic-ai/mcpb pack .

      - name: Upload MCPB to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" *.mcpb --clobber
